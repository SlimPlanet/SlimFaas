apiVersion: v1
kind: Service
metadata:
  name: {{ include "slimfaas.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "slimfaas.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
    - name: slimdata
      port: {{ .Values.service.slimDataPort }}
