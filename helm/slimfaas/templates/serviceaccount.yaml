{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "slimfaas.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.rbac.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "slimfaas.fullname" . }}-deployment-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "slimfaas.fullname" . }}-deployment-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "slimfaas.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "slimfaas.fullname" . }}-deployment-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "slimfaas.fullname" . }}-endpoints-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "slimfaas.fullname" . }}-endpoints-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slimfaas.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "slimfaas.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "slimfaas.fullname" . }}-endpoints-viewer
  apiGroup: rbac.authorization.k8s.io
{{- end }}
