apiVersion: v2
name: slimfaas
description: >
  SlimFaas is a lightweight, plug-and-play Function-as-a-Service (FaaS) platform
  for Kubernetes with autoscaling-first design including scale-to-zero, PromQL-driven
  autoscaling, sync/async functions, and batch jobs.
type: application
version: 0.1.0
