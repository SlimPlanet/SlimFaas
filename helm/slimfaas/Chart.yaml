  - kubernetes
home: https://slimfaas.dev
sources:
  - https://github.com/SlimPlanet/SlimFaas
maintainers:
  - name: SlimPlanet
    url: https://github.com/SlimPlanet
icon: https://raw.githubusercontent.com/SlimPlanet/SlimFaas/main/documentation/SlimFaas.png
